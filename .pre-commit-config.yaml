repos:
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: ["--fix"]
        language_version: python3
        always_run: true

  - repo: local
    hooks:
      - id: mypy
        name: PRE-COMMIT. Type Check with Mypy
        entry: uv run -m mypy ./src/sa2pydantic --explicit-package-bases
        language: system
        types: [python]
        always_run: true
        pass_filenames: false

      - id: pytest
        name: PRE-COMMIT. Run Tests with Pytest
        entry: uv run -m pytest ./tests
        language: system
        types: [python]
        always_run: true